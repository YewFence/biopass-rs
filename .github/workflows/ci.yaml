name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-24.04
    env:
      MISE_TASK_RUN_AUTO_INSTALL: "false"
      MISE_LOCKED: "1"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            curl \
            file \
            fprintd \
            libayatana-appindicator3-dev \
            libpam0g-dev \
            librsvg2-dev \
            libssl-dev \
            libv4l-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            nasm \
            pkg-config \
            wget

      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          install_args: node rust bun viteplus
          add_shims_to_path: true
          cache_key: "mise-v1-{{platform}}-{{install_args_hash}}-{{file_hash}}"

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-check-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-check-${{ runner.os }}-
            cargo-${{ runner.os }}-

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.bun/install/cache
            apps/desktop/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('apps/desktop/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: bun install --frozen-lockfile

      - name: Run checks
        run: mise run check

  audit:
    name: Audit
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      issues: write
      checks: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Rust dependency audit
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  audit-report:
    name: Audit report
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install_args: rust
          add_shims_to_path: true

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-audit-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-audit-${{ runner.os }}-

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run full audit (informational)
        run: |
          {
            echo "## cargo audit report"
            echo
            echo "_Generated by \`cargo audit\` on $(date -u '+%Y-%m-%d %H:%M:%S UTC'). Informational only — non-vulnerability warnings do not fail this job._"
            echo
            echo '```'
            cargo audit || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
