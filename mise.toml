[vars]
app_dir = "apps/desktop"

[env]
_.path = "./target/release"

[tasks.install-app]
description = "Install JS dependencies for the Tauri app"
run = "bun install --frozen-lockfile"
dir = "{{config_root}}/{{vars.app_dir}}"

[tasks.build-auth]
description = "Build the Rust auth helper, auth core and PAM module (debug)"
raw_args = true
run = 'cargo build --package biopass-rs-auth --package biopass-rs-pam "$@"'

[tasks.build-auth-release]
description = "Build the Rust auth helper, auth core and PAM module (release)"
raw_args = true
run = 'cargo build --release --package biopass-rs-auth --package biopass-rs-pam "$@"'

[tasks.build-app]
description = "Build the Tauri app (release bundle)"
alias = 'build'
depends = ["install-app", "build-auth-release"]
run = 'bun run tauri build "$@"'
dir = "{{config_root}}/{{vars.app_dir}}"

[tasks.dev-helper-build]
description = "Build the biopass-rs helper in debug mode"
run = "cargo build --package biopass-rs-auth --bin biopass-rs-helper"

[tasks.dev-helper]
description = "Run the biopass-rs helper CLI in debug mode"
depends = ["dev-helper-build"]
raw_args = true
run = "cargo run --package biopass-rs-auth --bin biopass-rs-helper --"

[tasks.dev-app]
description = "Run the Tauri app in development mode"
depends = ["dev-helper-build"]
run = "bun run tauri dev"
dir = "{{config_root}}/{{vars.app_dir}}"

[tasks.clean-auth]
description = "Remove Rust auth build artifacts"
run = "cargo clean --workspace"

[tasks.clean-app]
description = "Remove app build artifacts"
run = '''
cargo clean --manifest-path src-tauri/Cargo.toml
rm -rf dist node_modules
echo "cleaned dist and node_modules"
'''
dir = "{{config_root}}/{{vars.app_dir}}"

[tasks.clean]
description = "Remove auth and app build output"
run = [
    { task = "clean-auth" },
    { task = "clean-app" },
]


[tasks.check-app]
description = "Check frontend code with Vite+"
run = "vp check ."
dir = "{{config_root}}/{{vars.app_dir}}"

[tasks.lint-rust]
description = "Check Rust code formatting"
run = "cargo fmt --all --check"

[tasks.clippy-rust]
description = "Run Clippy lints on Rust code"
run = "cargo clippy --all --all-targets --all-features -- -D warnings"

[tasks.check-rust]
description = "Check Rust code compilation"
run = "cargo check --all"

[tasks.build-rust]
description = "Build Rust workspace"
depends = ["check-rust"]
run = "cargo build --all"

[tasks.check]
description = "Run all checks"
depends = ["check-app", "lint-rust", "clippy-rust"]
run = { task = "build-rust"}

[tasks.fix-rust]
description = "Format Rust code and auto-fix Clippy issues"
run = """
cargo fmt --all
cargo clippy --fix --all --all-targets --all-features --allow-dirty --allow-staged
"""

[tasks.fix-app]
description = "Auto-fix frontend formatting and lint issues with Vite+"
run = "vp check --fix ."
dir = "{{config_root}}/{{vars.app_dir}}"

[tasks.fix]
description = "Auto-fix Rust and frontend formatting where possible"
depends = ["fix-rust", "fix-app"]

[tools]
node = "24"
rust = "1"
bun = "1"
viteplus = "0"
git-lfs = "latest"
