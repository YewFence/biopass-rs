[vars]
auth_rust_dir = "auth/rust"
auth_pam_dir = "auth/rust/pam"
app_dir = "app"

[tasks.default]
description = "Build auth and app"
depends = [":build"]

[tasks.build]
description = "Build auth and app"
depends = [":build-app"]

[tasks.package]
description = "Build combined Linux bundles"
depends = [":package-app"]

[tasks.build-auth]
description = "Build the Rust auth helper, auth core and PAM module"
run = '''
#!/usr/bin/env bash
set -euo pipefail

if [ "${CARGO_PROFILE:-release}" = "release" ]; then
  cargo_build_flags=(--release)
else
  cargo_build_flags=()
fi

echo "==> [auth] Building Rust helper and auth core (CARGO_PROFILE=${CARGO_PROFILE:-release})..."
cargo build --manifest-path "{{vars.auth_rust_dir}}/Cargo.toml" "${cargo_build_flags[@]}"

echo "==> [auth] Building Rust PAM module (CARGO_PROFILE=${CARGO_PROFILE:-release})..."
cargo build --manifest-path "{{vars.auth_pam_dir}}/Cargo.toml" "${cargo_build_flags[@]}"
'''

[tasks.build-app]
description = "Install JS dependencies and build the Tauri app"
depends = [":build-auth"]
run = '''
#!/usr/bin/env bash
set -euo pipefail

echo "==> [app] Installing JS dependencies..."
bun install --frozen-lockfile

echo "==> [app] Building Tauri application..."
bun run tauri build
'''
dir = "{{config_root}}/{{vars.app_dir}}"

[tasks.package-app]
description = "Show combined Linux bundle output paths"
depends = [":build-app"]
run = '''
#!/usr/bin/env bash
set -euo pipefail

echo "==> [app] Tauri packages are in app/src-tauri/target/release/bundle/"
ls app/src-tauri/target/release/bundle/deb/*.deb app/src-tauri/target/release/bundle/rpm/*.rpm 2>/dev/null || true
'''

[tasks.clean]
description = "Remove auth and app build output"
depends = [":clean-auth", ":clean-app"]

[tasks.clean-auth]
description = "Remove Rust auth build artifacts"
run = '''
#!/usr/bin/env bash
set -euo pipefail

echo "==> [auth] Cleaning Rust build artifacts..."
cargo clean --manifest-path "{{vars.auth_rust_dir}}/Cargo.toml"
cargo clean --manifest-path "{{vars.auth_pam_dir}}/Cargo.toml"
'''

[tasks.clean-app]
description = "Remove app build artifacts"
run = '''
#!/usr/bin/env bash
set -euo pipefail

echo "==> [app] Cleaning build artifacts..."
cargo clean --manifest-path src-tauri/Cargo.toml 2>/dev/null || true
rm -rf dist
'''
dir = "{{config_root}}/{{vars.app_dir}}"

[tools]
node = "latest"
rust = "latest"
bun = "latest"
