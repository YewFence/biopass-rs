[vars]
app_dir = "apps/desktop"

[tasks.build]
description = "Build auth and app"
depends = ["build-app"]

[tasks.build-auth]
description = "Build the Rust auth helper, auth core and PAM module"
run = '''
if [ "${CARGO_PROFILE:-release}" = "release" ]; then
  cargo_build_flags=(--release)
else
  cargo_build_flags=()
fi

echo "==> [auth] Building Rust helper and auth core (CARGO_PROFILE=${CARGO_PROFILE:-release})..."
cargo build --package biopass-auth --package biopass-pam "${cargo_build_flags[@]}"
'''

[tasks.build-app]
description = "Install JS dependencies and build the Tauri app"
depends = ["build-auth"]
run = '''
echo "==> [app] Building Tauri application..."
bun run tauri build
'''
dir = "{{config_root}}/{{vars.app_dir}}"

[tasks.dev-helper-build]
description = "Build the biopass helper in debug mode"
run = "cargo build --package biopass-auth --bin biopass-helper"

[tasks.dev-helper]
description = "Run the biopass helper CLI in debug mode"
depends = ["dev-helper-build"]
raw_args = true
run = "cargo run --package biopass-auth --bin biopass-helper --"

[tasks.dev-app]
description = "Run the Tauri app in development mode"
depends = ["dev-helper-build"]
run = "bun run tauri dev"
dir = "{{config_root}}/{{vars.app_dir}}"

[tasks.clean]
description = "Remove auth and app build output"
depends = ["clean-auth", "clean-app"]

[tasks.clean-auth]
description = "Remove Rust auth build artifacts"
run = '''
cargo clean --package biopass-auth
cargo clean --package biopass-pam
'''

[tasks.clean-app]
description = "Remove app build artifacts"
run = '''
echo "==> [app] Cleaning build artifacts..."
cargo clean --package biopass 2>/dev/null || true
rm -rf dist
'''
dir = "{{config_root}}/{{vars.app_dir}}"

[tasks.lint-js]
description = "Check JS/TS code with Biome"
run = "bun run lint"
dir = "{{config_root}}/{{vars.app_dir}}"

[tasks.lint-rust]
description = "Check Rust code formatting"
run = "cargo fmt --all --check"

[tasks.check-rust]
description = "Check Rust code compilation"
run = "cargo check --all"

[tasks.check]
description = "Run all checks"
depends = ["lint-js", "lint-rust", "check-rust"]

[tools]
node = "latest"
rust = "latest"
bun = "latest"
lefthook = "latest"
